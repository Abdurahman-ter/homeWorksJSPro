<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function getLocation() {
        return new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(
            (response) => {
              resolve(response);
            },
            (err) => {
              reject(err);
            },
          );
        });
      }

      getLocation()
        .then((location) => {
          console.log(location);
        })
        .catch((err) => {
          console.log(err);
        });
    </script>
  </body>
</html>
